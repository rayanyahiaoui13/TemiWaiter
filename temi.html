<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Temi Dashboard - Supervisor Mode</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e1e; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .layout { display: flex; gap: 20px; width: 100%; }
        .panel { background: #2d2d2d; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #status-bar { width: 100%; padding: 10px; border-radius: 5px; font-weight: bold; text-align: center; background: #c0392b; box-sizing: border-box;}
        #video-panel { flex: 2; display: flex; flex-direction: column; }
        #video-container { width: 100%; height: 500px; background: black; border-radius: 8px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #controls-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; user-select: none; margin-bottom: 5px; }
        button:hover { background: #45a049; }
        button.danger { background: #e74c3c; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 60px); gap: 5px; justify-content: center; margin-top: 10px;}
        .d-pad button { padding: 15px 0; font-size: 18px; touch-action: none; }
        .up { grid-column: 2; }
        .left { grid-column: 1; }
        .right { grid-column: 3; }
        .down { grid-column: 2; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
</head>
<body>

    <div id="status-bar">🔴 CONFIGURING MQTT NETWORK...</div>

    <div class="layout">
        <div id="video-panel" class="panel">
            <h2>📷 Direct P2P Video Stream</h2>
            <div id="video-container">
                <video id="remote-video" autoplay playsinline></video>
            </div>
            <div style="margin-top: 15px; display: flex; gap: 10px;">
                <button onclick="startWebRTCCall()">1. Initialize WebRTC Call</button>
                <button onclick="publishMode('AUTO')" class="danger">Lock Motors (AUTO)</button>
                <button onclick="publishMode('MANUEL')">Unlock Motors (MANUAL)</button>
            </div>
        </div>

        <div id="controls-panel" class="panel">
            <div>
                <h3>🗺️ Autonomous Navigation (POI)</h3>
                <button onclick="sendGoTo('home base')" style="width: 100%;">Go to Home Base</button>
                <button onclick="sendGoTo('table 1')" style="width: 100%;">Go to Table 1</button>
                <button onclick="sendGoTo('table 2')" style="width: 100%;">Go to Table 2</button>
            </div>

            <hr style="border-color: #444;">

            <div>
                <h3>🕹️ Manual Teleoperation</h3>
                <p style="font-size: 11px; color: #aaa;">Use your keyboard arrows or the buttons below.</p>
                <div class="d-pad">
                    <button class="up" onmousedown="startJoy(1.0, 0.0)" onmouseup="stopJoy()" onmouseleave="stopJoy()">▲</button>
                    <button class="left" onmousedown="startJoy(0.0, 0.5)" onmouseup="stopJoy()" onmouseleave="stopJoy()">◀</button>
                    <button class="right" onmousedown="startJoy(0.0, -0.5)" onmouseup="stopJoy()" onmouseleave="stopJoy()">▶</button>
                    <button class="down" onmousedown="startJoy(-1.0, 0.0)" onmouseup="stopJoy()" onmouseleave="stopJoy()">▼</button>
                </div>
            </div>
            
            <hr style="border-color: #444;">
            
            <div>
                <h3>📋 Customer Requests (Live)</h3>
                <ul id="menu-notifications" style="background: #222; padding: 10px; border-radius: 5px; list-style-type: none; margin-top: 0; font-size: 14px; max-height: 150px; overflow-y: auto;">
                    <li style="color: #aaa; font-style: italic;">No active requests from the robot screen...</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        /*const BROKER = "192.168.0.135"; // IMPORTANT: Update this IP if your PC's IP changes
        const PORT = 9001; 
        const CLIENT_ID = "DashboardWebRTC_" + Math.random().toString(16).substr(2, 8);*/

        const BROKER = "0cb6b7de17494a0b8d1fbb40718195cd.s1.eu.hivemq.cloud"; 
        const PORT = 8884; 
        const CLIENT_ID = "DashboardWebRTC_" + Math.random().toString(16).substr(2, 8);
        
        const mqtt = new Paho.MQTT.Client(BROKER, PORT, CLIENT_ID);
        
        let peerConnection = null;
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        mqtt.onConnectionLost = function (responseObj) {
            document.getElementById("status-bar").style.background = "#c0392b";
            document.getElementById("status-bar").innerText = "🔴 MQTT CONNECTION LOST";
        };

        // ==========================================
        // INCOMING MESSAGES HANDLER (CSV GENERATOR)
        // ==========================================
        mqtt.onMessageArrived = function (message) {
            const payload = JSON.parse(message.payloadString);
            
            if (message.destinationName === "temi/webrtc/answer") {
                peerConnection.setRemoteDescription(new RTCSessionDescription(payload));
            } else if (message.destinationName === "temi/webrtc/candidate/robot") {
                peerConnection.addIceCandidate(new RTCIceCandidate(payload));
            } else if (message.destinationName === "temi/status") {
                console.log("Robot Navigation Status: ", payload);
            } else if (message.destinationName === "temi/menu") {
                
                // 1. IF IT IS AN ORDER VALIDATION -> Generate CSV on the PC
                if (payload.type === "order_validation") {
                    console.log("New order received:", payload);
                    
                    // We add the BOM (Byte Order Mark) to force Excel to read UTF-8 properly
                    let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
                    
                    // MODIFICATION: Using Semicolons (;) instead of Commas (,)
                    csvContent += "Date_Time;Item;Price_Euro\n"; 

                    // Add rows for each item ordered
                    payload.items.forEach(function(item) {
                        csvContent += `${payload.timestamp};${item.name};${item.price.toFixed(2)}\n`;
                    });
                    
                    // Add Total line at the bottom
                    csvContent += `;;TOTAL : ${payload.total.toFixed(2)}\n`;

                    // Trigger automatic download on the PC
                    let encodedUri = encodeURI(csvContent);
                    let link = document.createElement("a");
                    link.setAttribute("href", encodedUri);
                    let safeFileName = payload.timestamp.replace(/[: ]/g, "_");
                    link.setAttribute("download", `Temi_Order_${safeFileName}.csv`);
                    document.body.appendChild(link); 
                    link.click();
                    document.body.removeChild(link);

                    // Audio alert on the PC to notify the staff (Kitchen Bell)
                    new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play().catch(e => {});
                    
                    // Add a visual confirmation in the Notification box
                    const list = document.getElementById("menu-notifications");
                    if(list && list.innerHTML.includes("No active requests")) list.innerHTML = "";
                    let li = document.createElement("li");
                    li.innerText = `✅ ORDER VALIDATED: ${payload.items.length} items (Total: ${payload.total.toFixed(2)}€) - CSV Saved.`;
                    li.style.color = "#2ecc71";
                    li.style.fontWeight = "bold";
                    if(list) list.prepend(li);
                }
                
                // 2. IF IT IS A SIMPLE CLICK ON A DISH (For live notification tracking)
                else if (payload.request) {
                    const list = document.getElementById("menu-notifications");
                    if(list && list.innerHTML.includes("No active requests")) list.innerHTML = "";
                    
                    let li = document.createElement("li");
                    li.innerText = `🔔 Client added to cart: ${payload.request} (${new Date().toLocaleTimeString()})`;
                    li.style.color = "#f1c40f";
                    if(list) list.prepend(li);
                }
            }
        };

        // ==========================================
        // MQTT CONNECTION
        // ==========================================
        mqtt.connect({
            userName: "temi_admin",          // <-- Remplace par ton vrai nom d'utilisateur HiveMQ
            password: "TestTemi1",     // <-- Remplace par ton vrai mot de passe HiveMQ
            useSSL: true,                    // <-- OBLIGATOIRE pour le cloud !
            onSuccess: function () { 
                document.getElementById("status-bar").style.background = "#2ecc71";
                document.getElementById("status-bar").innerText = "🟢 ONLINE (MQTT CLOUD OK) - Ready for WebRTC";
                mqtt.subscribe("temi/webrtc/answer");
                mqtt.subscribe("temi/webrtc/candidate/robot");
                mqtt.subscribe("temi/status");
                mqtt.subscribe("temi/menu");
            },
            onFailure: function (message) {
                document.getElementById("status-bar").style.background = "#c0392b";
                document.getElementById("status-bar").innerText = "🔴 CLOUD CONNECTION FAILED : " + message.errorMessage;
            }
        });

        function publishData(topic, payloadObj) {
            if (mqtt.isConnected()) {
                let message = new Paho.MQTT.Message(JSON.stringify(payloadObj));
                message.destinationName = topic;
                mqtt.send(message);
            }
        }

        // ==========================================
        // WEBRTC CALL INIT
        // ==========================================
        async function startWebRTCCall() {
            peerConnection = new RTCPeerConnection(rtcConfig);

            peerConnection.onicecandidate = event => {
                if (event.candidate) publishData("temi/webrtc/candidate/pc", event.candidate);
            };

            peerConnection.ontrack = event => {
                document.getElementById("remote-video").srcObject = event.streams[0];
            };

            try {
                // Audio and Video enabled for Two-Way communication
                const localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            } catch (e) {
                console.warn("Camera/Mic not accessible on this PC.");
            }

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            publishData("temi/webrtc/offer", { type: offer.type, sdp: offer.sdp });
        }

        // ==========================================
        // ROBOT CONTROLS
        // ==========================================
        function sendGoTo(destinationName) {
            publishData("temi/commands", { action: "goto", destination: destinationName });
        }

        function publishMode(mode) {
            if (mqtt.isConnected()) {
                let msg = new Paho.MQTT.Message(mode);
                msg.destinationName = "temi/mode";
                mqtt.send(msg);
            }
        }

        let movementLoop = null;
        function startJoy(speed, rotation) {
            publishData("temi/joystick", { speed: speed, rotation: rotation });
            if (movementLoop) clearInterval(movementLoop);
            movementLoop = setInterval(() => { publishData("temi/joystick", { speed: speed, rotation: rotation }); }, 100);
        }

        function stopJoy() {
            if (movementLoop) { clearInterval(movementLoop); movementLoop = null; }
            publishData("temi/joystick", { speed: 0.0, rotation: 0.0 });
        }

        // Keyboard Arrows Teleoperation
        const activeKeys = {};
        document.addEventListener("keydown", (event) => {
            const key = event.key;
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(key)) {
                event.preventDefault(); 
                if (activeKeys[key]) return; 
                activeKeys[key] = true;
                if (key === "ArrowUp") startJoy(1.0, 0.0);
                else if (key === "ArrowDown") startJoy(-1.0, 0.0);
                else if (key === "ArrowLeft") startJoy(0.0, 0.5);
                else if (key === "ArrowRight") startJoy(0.0, -0.5);
            }
        });

        document.addEventListener("keyup", (event) => {
            const key = event.key;
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(key)) {
                activeKeys[key] = false; stopJoy();
            }
        });
    </script>
</body>
</html>
