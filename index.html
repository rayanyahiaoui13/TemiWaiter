<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Temi Dashboard - Supervisor Mode</title>
    <!-- Include Tailwind CSS for modern styling and layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        temi: {
                            orange: '#d35400',       // Deep Temi Orange
                            'orange-hover': '#e67e22',
                            dark: '#1e272e',         // Very dark anthracite for background
                            panel: '#2d3436',        // Dark gray for panels
                            light: '#f5f6fa',        // Light gray text/elements
                            green: '#27ae60',        // Success green
                            'green-hover': '#2ecc71',
                            red: '#c0392b',          // Danger red
                            'red-hover': '#e74c3c'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Include Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Include MQTT library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1e272e; /* temi-dark */
            color: #f5f6fa; /* temi-light */
        }
        
        /* Custom scrollbar for panels */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #2d3436; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #636e72; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b2bec3; 
        }

        #video-container {
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        /* NOUVEAU : Vidéo de l'opérateur (Selfie / Picture in Picture) */
        #local-video {
            transform: scaleX(-1); /* Effet miroir pour le confort de l'opérateur */
        }

        /* D-PAD specific styles overriding tailwind for complex grid */
        .d-pad-grid {
            display: grid;
            grid-template-columns: repeat(3, 64px);
            gap: 8px;
            justify-content: center;
        }
        .d-pad-btn {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            touch-action: none; /* Prevent scrolling on mobile when using dpad */
            user-select: none;
        }
        .up { grid-column: 2; }
        .left { grid-column: 1; }
        .right { grid-column: 3; }
        .down { grid-column: 2; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 md:p-6 overflow-hidden">

    <!-- Top Status Bar -->
    <div id="status-bar" class="w-full py-3 px-4 rounded-lg font-bold text-center bg-temi-red text-white uppercase tracking-wider mb-6 shadow-md transition-colors duration-300">
        CONFIGURING MQTT NETWORK...
    </div>

    <!-- Main Content Layout -->
    <div class="flex flex-col lg:flex-row gap-6 h-full min-h-0">
        
        <!-- LEFT PANEL: Video and Primary Controls -->
        <div class="flex-[2] flex flex-col gap-4 bg-temi-panel p-5 rounded-xl shadow-xl min-w-[300px]">
            <h2 class="text-xl font-semibold text-gray-200 border-b border-gray-600 pb-2">Control Center</h2>
            
            <!-- Video Area -->
            <div id="video-container" class="relative w-full aspect-video bg-black rounded-lg overflow-hidden flex-grow border border-gray-700">
                <!-- Remote Video (Robot Camera) -->
                <video id="remote-video" class="absolute inset-0 w-full h-full object-cover" autoplay playsinline></video>
                
                <!-- Local Video (Operator Camera - Picture in Picture) -->
                <video id="local-video" class="absolute bottom-4 right-4 w-32 md:w-40 aspect-video object-cover rounded-md border-2 border-gray-400 bg-gray-800 shadow-lg z-10" autoplay playsinline muted></video>
            </div>
            
            <!-- Under Video Controls -->
            <div class="flex flex-col sm:flex-row gap-4 mt-2">
                <!-- Action Buttons -->
                <div class="flex-1 flex flex-col sm:flex-row gap-2">
                    <button onclick="startWebRTCCall()" class="flex-[2] bg-temi-orange hover:bg-temi-orange-hover text-white font-bold py-3 px-4 rounded transition-colors shadow-md text-sm md:text-base">
                        Initialize WebRTC Call
                    </button>
                    <button onclick="toggleMute()" id="btn-mute" class="flex-1 bg-gray-600 hover:bg-gray-500 text-white font-semibold py-3 px-4 rounded transition-colors shadow-md text-sm md:text-base">
                        Mute Mic
                    </button>
                    <button onclick="toggleVideo()" id="btn-video" class="flex-1 bg-gray-600 hover:bg-gray-500 text-white font-semibold py-3 px-4 rounded transition-colors shadow-md text-sm md:text-base">
                        Disable Video
                    </button>
                </div>
            </div>

            <!-- Robot Live Status -->
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 shadow-inner mt-2">
                <div class="text-temi-orange font-semibold text-sm uppercase tracking-wide border-b border-gray-600 pb-2 mb-3">
                    Robot Live Status
                </div>
                <div class="flex flex-col gap-2 text-sm">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400">Current Task:</span>
                        <span id="robot-task" class="font-bold text-gray-500">Idle / Standby</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400">Destination:</span>
                        <span id="robot-dest" class="font-bold text-temi-orange">-</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL: Navigation, Joystick, and Logs -->
        <div class="flex-1 flex flex-col gap-6 bg-temi-panel p-5 rounded-xl shadow-xl min-w-[280px] overflow-y-auto">
            
            <!-- Autonomous Navigation -->
            <div class="flex flex-col gap-2">
                <h3 class="text-lg font-semibold text-gray-200 border-b border-gray-600 pb-1 mb-2">Autonomous Navigation</h3>
                <button onclick="sendGoTo('home base')" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-medium py-2 px-4 rounded transition-colors text-sm">
                    Go to Home Base
                </button>
                <button onclick="sendGoTo('table 1')" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-medium py-2 px-4 rounded transition-colors text-sm">
                    Go to Table 1
                </button>
                <button onclick="sendGoTo('standby')" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-medium py-2 px-4 rounded transition-colors text-sm">
                    Go to Standby
                </button>
            </div>

            <hr class="border-gray-600">

            <!-- Manual Teleoperation -->
            <div class="flex flex-col items-center">
                <div class="w-full text-left">
                    <h3 class="text-lg font-semibold text-gray-200 border-b border-gray-600 pb-1 mb-1">Manual Teleoperation</h3>
                    <p class="text-xs text-gray-400 mb-4">Use keyboard arrows or D-Pad to drive.</p>
                </div>
                
                <div class="d-pad-grid">
                    <button class="d-pad-btn up bg-gray-600 hover:bg-temi-orange text-white rounded shadow-md transition-colors" 
                            onmousedown="startJoy(1.0, 0.0)" onmouseup="stopJoy()" onmouseleave="stopJoy()"
                            ontouchstart="startJoy(1.0, 0.0); event.preventDefault();" ontouchend="stopJoy(); event.preventDefault();">▲</button>
                    <button class="d-pad-btn left bg-gray-600 hover:bg-temi-orange text-white rounded shadow-md transition-colors" 
                            onmousedown="startJoy(0.0, 0.5)" onmouseup="stopJoy()" onmouseleave="stopJoy()"
                            ontouchstart="startJoy(0.0, 0.5); event.preventDefault();" ontouchend="stopJoy(); event.preventDefault();">◀</button>
                    <button class="d-pad-btn right bg-gray-600 hover:bg-temi-orange text-white rounded shadow-md transition-colors" 
                            onmousedown="startJoy(0.0, -0.5)" onmouseup="stopJoy()" onmouseleave="stopJoy()"
                            ontouchstart="startJoy(0.0, -0.5); event.preventDefault();" ontouchend="stopJoy(); event.preventDefault();">▶</button>
                    <button class="d-pad-btn down bg-gray-600 hover:bg-temi-orange text-white rounded shadow-md transition-colors" 
                            onmousedown="startJoy(-1.0, 0.0)" onmouseup="stopJoy()" onmouseleave="stopJoy()"
                            ontouchstart="startJoy(-1.0, 0.0); event.preventDefault();" ontouchend="stopJoy(); event.preventDefault();">▼</button>
                </div>
            </div>
            
            <hr class="border-gray-600">
            
            <!-- Live Activity & Cart -->
            <div class="flex flex-col flex-grow min-h-0">
                <h3 class="text-lg font-semibold text-gray-200 border-b border-gray-600 pb-1 mb-3">Live Activity</h3>
                
                <div class="flex flex-col md:flex-row gap-4 flex-grow min-h-0">
                    
                    <!-- Customer Cart -->
                    <div class="flex-1 bg-gray-800 p-3 rounded-lg border border-gray-700 flex flex-col">
                        <h4 class="text-temi-orange font-semibold text-sm mb-2">Customer Cart</h4>
                        
                        <ul id="live-cart-list" class="flex-grow overflow-y-auto text-sm text-gray-300 space-y-1 pr-1">
                            <li class="text-gray-500 italic text-xs">Empty cart...</li>
                        </ul>
                        
                        <div class="mt-2 pt-2 border-t border-gray-600">
                            <strong id="live-cart-total" class="text-temi-green text-sm block">Total: RM0.00</strong>
                            <button onclick="clearLiveCart()" class="mt-2 w-full bg-gray-600 hover:bg-gray-500 text-gray-200 text-xs py-1.5 px-2 rounded transition-colors">
                                Clear / Resync
                            </button>
                        </div>
                    </div>

                    <!-- Activity Log -->
                    <div class="flex-1 bg-gray-800 p-3 rounded-lg border border-gray-700 flex flex-col">
                        <h4 class="text-gray-300 font-semibold text-sm mb-2">Activity Log</h4>
                        
                        <ul id="menu-notifications" class="flex-grow overflow-y-auto text-xs text-gray-400 space-y-2 pr-1">
                            <li class="italic">Waiting for actions...</li>
                        </ul>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- HIVEMQ CLOUD CREDENTIALS ---
        const BROKER = "0cb6b7de17494a0b8d1fbb40718195cd.s1.eu.hivemq.cloud"; 
        const PORT = 8884; 
        const CLIENT_ID = "DashboardWebRTC_" + Math.random().toString(16).substr(2, 8);
        
        const mqtt = new Paho.MQTT.Client(BROKER, PORT, CLIENT_ID);
        
        let peerConnection = null;
        let globalLocalStream = null;

        // --- VIRTUAL CART MANAGEMENT ---
        const menuPrices = {
            "Caesar Salad": 8.50, "Garlic Bread": 5.00,
            "Temi Burger": 15.00, "Grilled Salmon": 18.00,
            "Choco Fondant": 6.50, "Cheesecake": 7.00,
            "Coca-Cola": 3.50, "Water Bottle": 2.00
        };
        let liveCart = [];

        function updateLiveCartUI() {
            const list = document.getElementById("live-cart-list");
            const totalEl = document.getElementById("live-cart-total");
            
            if (liveCart.length === 0) {
                list.innerHTML = '<li class="text-gray-500 italic text-xs">Empty cart...</li>';
                totalEl.innerText = "Total: RM0.00";
                return;
            }

            list.innerHTML = "";
            let total = 0;
            liveCart.forEach(item => {
                let price = menuPrices[item] || 0;
                total += price;
                let li = document.createElement("li");
                li.className = "flex justify-between items-center py-0.5 border-b border-gray-700 last:border-0";
                li.innerHTML = `<span>${item}</span><span class="text-gray-400 font-mono text-xs">RM${price.toFixed(2)}</span>`;
                list.appendChild(li);
            });
            totalEl.innerText = `Total: RM${total.toFixed(2)}`;
        }

        function clearLiveCart() {
            liveCart = [];
            updateLiveCartUI();
        }

        // --- WEBRTC CONFIGURATION (STUN + TURN Metered) ---
        const rtcConfig = { 
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { 
                    urls: 'turn:Temix.metered.live:80', 
                    username: '3aed535ef4abcfe26c68e954', 
                    credential: 'wjtztZMLI2zABv31' 
                }
            ] 
        };

        mqtt.onConnectionLost = function (responseObj) {
            const bar = document.getElementById("status-bar");
            bar.classList.replace("bg-temi-green", "bg-temi-red");
            bar.innerText = "MQTT CONNECTION LOST";
        };

        mqtt.onMessageArrived = function (message) {
            const payload = JSON.parse(message.payloadString);
            
            if (message.destinationName === "temi/webrtc/answer") {
                peerConnection.setRemoteDescription(new RTCSessionDescription(payload));
            } else if (message.destinationName === "temi/webrtc/candidate/robot") {
                peerConnection.addIceCandidate(new RTCIceCandidate(payload));
            } else if (message.destinationName === "temi/status") {
                
                // Update Robot Live Status UI
                if (payload.type === "navigation_status") {
                    const destEl = document.getElementById("robot-dest");
                    const taskEl = document.getElementById("robot-task");
                    
                    destEl.innerText = payload.location ? payload.location.toUpperCase() : "None";
                    
                    let statusText = payload.status.toUpperCase();
                    
                    // Reset styling
                    taskEl.className = "font-bold";
                    
                    if (payload.status === "start" || payload.status === "going") {
                        statusText = "Moving"; 
                        taskEl.classList.add("text-blue-400");
                    } else if (payload.status === "complete") {
                        statusText = "Arrived"; 
                        taskEl.classList.add("text-temi-green");
                    } else if (payload.status === "abort") {
                        statusText = "Aborted"; 
                        taskEl.classList.add("text-temi-red");
                    } else if (payload.status === "calculating") {
                        statusText = "Calculating Path";
                        taskEl.classList.add("text-gray-400");
                    } else {
                        taskEl.classList.add("text-gray-500");
                    }
                    
                    taskEl.innerText = statusText;
                }
                
            } else if (message.destinationName === "temi/menu") {
                
                if (payload.type === "order_validation") {
                    // Generate CSV
                    let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
                    csvContent += "Date_Time;Item;Price_RM\n"; 

                    payload.items.forEach(function(item) {
                        csvContent += `${payload.timestamp};${item.name};${item.price.toFixed(2)}\n`;
                    });
                    csvContent += `;;TOTAL : ${payload.total.toFixed(2)}\n`;

                    let encodedUri = encodeURI(csvContent);
                    let link = document.createElement("a");
                    link.setAttribute("href", encodedUri);
                    let safeFileName = payload.timestamp.replace(/[: ]/g, "_");
                    link.setAttribute("download", `Temi_Order_${safeFileName}.csv`);
                    document.body.appendChild(link); 
                    link.click();
                    document.body.removeChild(link);

                    // Optional: Play a tiny beep
                    new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play().catch(e => {});
                    
                    // Add to Log
                    const list = document.getElementById("menu-notifications");
                    if(list && list.innerHTML.includes("Waiting")) list.innerHTML = "";
                    let li = document.createElement("li");
                    li.className = "text-temi-green font-semibold py-1 border-b border-gray-700 last:border-0";
                    li.innerText = `[ORDER VALIDATED] ${payload.items.length} items (Total: RM${payload.total.toFixed(2)})`;
                    if(list) list.prepend(li);

                    clearLiveCart();
                } 
                else if (payload.request) {
                    // Add to Log
                    const list = document.getElementById("menu-notifications");
                    if(list && list.innerHTML.includes("Waiting")) list.innerHTML = "";
                    
                    let li = document.createElement("li");
                    li.className = "text-gray-300 py-1 border-b border-gray-700 last:border-0";
                    li.innerText = `Added: ${payload.request}`;
                    if(list) list.prepend(li);

                    // Update Virtual Cart
                    liveCart.push(payload.request);
                    updateLiveCartUI();
                }
            }
        };

        mqtt.connect({
            userName: "temi_admin",          
            password: "TestTemi1",     
            useSSL: true,                    
            onSuccess: function () { 
                const bar = document.getElementById("status-bar");
                bar.classList.replace("bg-temi-red", "bg-temi-green");
                bar.innerText = "ONLINE (CLOUD) - Ready for video";
                
                mqtt.subscribe("temi/webrtc/answer");
                mqtt.subscribe("temi/webrtc/candidate/robot");
                mqtt.subscribe("temi/status");
                mqtt.subscribe("temi/menu");
                publishMode('MANUEL'); 
            },
            onFailure: function (message) {
                const bar = document.getElementById("status-bar");
                bar.classList.replace("bg-temi-green", "bg-temi-red");
                bar.innerText = "CLOUD CONNECTION FAILED: " + message.errorMessage;
            }
        });

        function publishData(topic, payloadObj) {
            if (mqtt.isConnected()) {
                let message = new Paho.MQTT.Message(JSON.stringify(payloadObj));
                message.destinationName = topic;
                message.qos = 0; 
                mqtt.send(message);
            }
        }

        // --- WEBRTC CALL INITIALIZATION ---
        async function startWebRTCCall() {
            peerConnection = new RTCPeerConnection(rtcConfig);

            peerConnection.onicecandidate = event => {
                if (event.candidate) publishData("temi/webrtc/candidate/pc", event.candidate);
            };

            peerConnection.ontrack = event => {
                document.getElementById("remote-video").srcObject = event.streams[0];
            };

            try {
                const localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                globalLocalStream = localStream;
                document.getElementById("local-video").srcObject = localStream;
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                
                // Visual feedback on the button
                const btn = document.querySelector('button[onclick="startWebRTCCall()"]');
                btn.innerText = "Call Active";
                btn.classList.replace("bg-temi-orange", "bg-gray-600");
                btn.classList.replace("hover:bg-temi-orange-hover", "hover:bg-gray-500");
                btn.disabled = true;
                btn.style.cursor = "default";

            } catch (e) {
                console.warn("Camera/Mic not accessible.", e);
                alert("Please allow camera access.");
            }

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            publishData("temi/webrtc/offer", { type: offer.type, sdp: offer.sdp });
        }

        // --- MEDIA CONTROLS ---
        let isMuted = false;
        let isVideoStopped = false;

        function toggleMute() {
            if(!globalLocalStream) return;
            isMuted = !isMuted;
            globalLocalStream.getAudioTracks()[0].enabled = !isMuted;
            const btn = document.getElementById('btn-mute');
            btn.innerText = isMuted ? "Unmute Mic" : "Mute Mic";
            
            if(isMuted) {
                btn.classList.replace("bg-gray-600", "bg-temi-orange");
                btn.classList.replace("hover:bg-gray-500", "hover:bg-temi-orange-hover");
            } else {
                btn.classList.replace("bg-temi-orange", "bg-gray-600");
                btn.classList.replace("hover:bg-temi-orange-hover", "hover:bg-gray-500");
            }
        }

        function toggleVideo() {
            if(!globalLocalStream) return;
            isVideoStopped = !isVideoStopped;
            globalLocalStream.getVideoTracks()[0].enabled = !isVideoStopped;
            const btn = document.getElementById('btn-video');
            btn.innerText = isVideoStopped ? "Enable Video" : "Disable Video";
            
            if(isVideoStopped) {
                btn.classList.replace("bg-gray-600", "bg-temi-orange");
                btn.classList.replace("hover:bg-gray-500", "hover:bg-temi-orange-hover");
            } else {
                btn.classList.replace("bg-temi-orange", "bg-gray-600");
                btn.classList.replace("hover:bg-temi-orange-hover", "hover:bg-gray-500");
            }
        }

        // --- ROBOT CONTROLS ---
        function sendGoTo(destinationName) {
            publishData("temi/commands", { action: "goto", destination: destinationName });
        }

        function publishMode(mode) {
            if (mqtt.isConnected()) {
                let msg = new Paho.MQTT.Message(mode);
                msg.destinationName = "temi/mode";
                mqtt.send(msg);
            }
        }

        let movementLoop = null;
        let currentSpeed = 0.0;
        let currentRotation = 0.0;

        function startJoy(speed, rotation) {
            currentSpeed = speed;
            currentRotation = rotation;
            publishData("temi/joystick", { speed: currentSpeed, rotation: currentRotation });
            
            if (movementLoop) clearInterval(movementLoop);
            movementLoop = setInterval(() => { 
                publishData("temi/joystick", { speed: currentSpeed, rotation: currentRotation }); 
            }, 100); 
        }

        function stopJoy() {
            if (movementLoop) { clearInterval(movementLoop); movementLoop = null; }
            currentSpeed = 0.0;
            currentRotation = 0.0;
            publishData("temi/joystick", { speed: 0.0, rotation: 0.0 });
        }

        const activeKeys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        function updateJoystickFromKeys() {
            let s = 0.0;
            let r = 0.0;

            if (activeKeys["ArrowUp"]) s = 1.0;
            if (activeKeys["ArrowDown"]) s = -1.0;
            if (activeKeys["ArrowLeft"]) r = 0.5;
            if (activeKeys["ArrowRight"]) r = -0.5;

            if (s === 0.0 && r === 0.0) {
                stopJoy();
            } else {
                startJoy(s, r);
            }
        }

        document.addEventListener("keydown", (event) => {
            if (activeKeys.hasOwnProperty(event.key)) {
                event.preventDefault(); 
                if (!activeKeys[event.key]) {
                    activeKeys[event.key] = true;
                    updateJoystickFromKeys();
                }
            }
        });

        document.addEventListener("keyup", (event) => {
            if (activeKeys.hasOwnProperty(event.key)) {
                event.preventDefault();
                activeKeys[event.key] = false;
                updateJoystickFromKeys();
            }
        });
    </script>
</body>
</html>
