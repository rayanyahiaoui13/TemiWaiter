<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temi Dashboard - Supervisor Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script>
        // Custom Tailwind colors for Temi theme
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'temi-bg': '#1e2124',
                        'temi-panel': '#282b30',
                        'temi-orange': '#e67e22',
                        'temi-orange-hover': '#d35400',
                        'temi-button': '#424549',
                        'temi-button-hover': '#36393e',
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbars for cleaner UI */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-temi-bg text-gray-300 font-sans p-4 md:p-6 min-h-screen flex flex-col gap-6">

    <div id="status-bar" class="w-full p-3 rounded-lg font-bold text-center bg-red-600 text-white shadow-md transition-colors duration-300">
        🔴 CONFIGURING MQTT NETWORK...
    </div>

    <div class="flex flex-col lg:flex-row gap-6 w-full max-w-[95vw] mx-auto">
        
        <div class="flex-[3] flex flex-col gap-4 bg-temi-panel p-5 rounded-xl shadow-xl min-w-[300px]">
            <h2 class="text-xl font-semibold text-gray-200 border-b border-gray-600 pb-2">Control Center</h2>
            
            <div id="video-container" class="relative w-full min-h-[65vh] md:min-h-[75vh] bg-black rounded-lg overflow-hidden flex-grow border border-gray-700">
                <video id="remote-video" class="absolute inset-0 w-full h-full object-cover object-bottom" autoplay playsinline></video>
                <video id="local-video" class="absolute bottom-4 right-4 w-48 md:w-72 aspect-video object-cover rounded-md border-2 border-gray-400 bg-gray-800 shadow-lg z-10" autoplay playsinline muted></video>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4 mt-2">
                <button onclick="startWebRTCCall()" id="btn-call" class="flex-2 bg-temi-orange hover:bg-temi-orange-hover text-white font-bold py-3 px-4 rounded-lg shadow transition-colors w-full sm:w-auto text-center">
                    Initialize WebRTC Call
                </button>
                <button onclick="toggleMute()" id="btn-mute" class="flex-1 bg-temi-button hover:bg-temi-button-hover text-gray-200 font-semibold py-3 px-4 rounded-lg shadow transition-colors w-full sm:w-auto text-center">
                    Mute Mic
                </button>
                <button onclick="toggleVideo()" id="btn-video" class="flex-1 bg-temi-button hover:bg-temi-button-hover text-gray-200 font-semibold py-3 px-4 rounded-lg shadow transition-colors w-full sm:w-auto text-center">
                    Disable Video
                </button>
            </div>
        </div>

        <div class="flex-[1.5] flex flex-col gap-6 w-full min-w-[350px]">
            
            <div class="bg-temi-panel p-5 rounded-xl shadow-xl">
                <h3 class="text-lg font-semibold text-gray-200 mb-3">Autonomous Navigation</h3>
                <div class="flex flex-col gap-2">
                    <button onclick="sendGoTo('home base')" class="bg-temi-button hover:bg-temi-button-hover text-gray-200 font-medium py-2 px-4 rounded shadow transition-colors">Go to Home Base</button>
                    <button onclick="sendGoTo('table 1')" class="bg-temi-button hover:bg-temi-button-hover text-gray-200 font-medium py-2 px-4 rounded shadow transition-colors">Go to Table 1</button>
                    <button onclick="sendGoTo('standby')" class="bg-temi-button hover:bg-temi-button-hover text-gray-200 font-medium py-2 px-4 rounded shadow transition-colors">Go to Standby</button>
                </div>
            </div>

            <div class="bg-temi-panel p-5 rounded-xl shadow-xl">
                <h3 class="text-lg font-semibold text-gray-200 mb-1">Manual Teleoperation</h3>
                <p class="text-xs text-gray-400 mb-4">Use keyboard arrows or D-Pad to drive.</p>
                
                <div class="grid grid-cols-3 grid-rows-2 gap-1 w-40 mx-auto mb-6">
                    <div class="col-start-2 row-start-1">
                        <button class="w-full h-12 bg-temi-button hover:bg-gray-500 text-white rounded shadow-md transition-colors select-none touch-manipulation flex items-center justify-center text-2xl font-bold" onmousedown="startJoy(1.0, 0.0)" onmouseup="stopJoy()" onmouseleave="stopJoy()" ontouchstart="startJoy(1.0, 0.0)" ontouchend="stopJoy()">↑</button>
                    </div>
                    <div class="col-start-1 row-start-2">
                        <button class="w-full h-12 bg-temi-button hover:bg-gray-500 text-white rounded shadow-md transition-colors select-none touch-manipulation flex items-center justify-center text-2xl font-bold" onmousedown="startJoy(0.0, 0.5)" onmouseup="stopJoy()" onmouseleave="stopJoy()" ontouchstart="startJoy(0.0, 0.5)" ontouchend="stopJoy()">←</button>
                    </div>
                    <div class="col-start-2 row-start-2">
                        <button class="w-full h-12 bg-temi-button hover:bg-gray-500 text-white rounded shadow-md transition-colors select-none touch-manipulation flex items-center justify-center text-2xl font-bold" onmousedown="startJoy(-1.0, 0.0)" onmouseup="stopJoy()" onmouseleave="stopJoy()" ontouchstart="startJoy(-1.0, 0.0)" ontouchend="stopJoy()">↓</button>
                    </div>
                    <div class="col-start-3 row-start-2">
                        <button class="w-full h-12 bg-temi-button hover:bg-gray-500 text-white rounded shadow-md transition-colors select-none touch-manipulation flex items-center justify-center text-2xl font-bold" onmousedown="startJoy(0.0, -0.5)" onmouseup="stopJoy()" onmouseleave="stopJoy()" ontouchstart="startJoy(0.0, -0.5)" ontouchend="stopJoy()">→</button>
                    </div>
                </div>

                <div class="border-t border-gray-600 pt-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-semibold text-gray-300">📷 Camera Tilt</span>
                        <span id="tilt-value" class="text-xs font-mono text-temi-orange bg-gray-800 px-2 py-1 rounded">0°</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs text-gray-400">Up</span>
                        <input type="range" min="-25" max="55" value="0" 
                               class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-temi-orange"
                               oninput="setTiltAngle(this.value)">
                        <span class="text-xs text-gray-400">Down</span>
                    </div>
                </div>

                <button id="btn-facetrack" onclick="toggleFaceTracking()" class="w-full bg-temi-button hover:bg-gray-500 text-white font-bold py-3 px-4 rounded-lg shadow transition-colors text-center mt-4">
                    🤖 Auto-Track: OFF
                </button>
            </div>

            <div class="bg-temi-panel p-5 rounded-xl shadow-xl flex-grow flex flex-col">
                <h3 class="text-lg font-semibold text-gray-200 mb-3">Live Activity</h3>
                
                <div class="flex flex-col gap-4 flex-grow">
                    <div class="bg-temi-bg p-3 rounded-lg border border-gray-700 flex flex-col">
                        <h4 class="text-temi-orange text-sm font-semibold mb-2">Customer Cart</h4>
                        <ul id="live-cart-list" class="text-sm text-gray-300 flex-grow min-h-[4rem] max-h-32 overflow-y-auto no-scrollbar space-y-1">
                            <li class="text-gray-500 italic">Empty cart...</li>
                        </ul>
                        <div class="mt-2 pt-2 border-t border-gray-700 flex justify-between items-center">
                            <strong id="live-cart-total" class="text-green-500 text-sm">Total: RM0.00</strong>
                            <button onclick="clearLiveCart()" class="bg-gray-700 hover:bg-gray-600 text-xs text-white py-1 px-2 rounded transition-colors">Clear / Resync</button>
                        </div>
                    </div>

                    <div class="bg-temi-bg p-3 rounded-lg border border-gray-700 flex flex-col flex-grow">
                        <h4 class="text-temi-orange text-sm font-semibold mb-2">Activity Log</h4>
                        <ul id="menu-notifications" class="text-sm text-gray-300 min-h-[4rem] max-h-32 overflow-y-auto no-scrollbar space-y-1">
                            <li class="text-gray-500 italic">Waiting for actions...</li>
                        </ul>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script>

        // Remote HiveMQ cluster address to route data between dashboard and robot
        const BROKER = "0cb6b7de17494a0b8d1fbb40718195cd.s1.eu.hivemq.cloud"; 
        // WSS (Secure WebSocket) port required for browser-based MQTT clients
        const PORT = 8884; 
        // Generates a random client ID to prevent connection drops from duplicates
        const CLIENT_ID = "DashboardWebRTC_" + Math.random().toString(16).substr(2, 8);
        
        // Instantiate the Paho MQTT client object
        const mqtt = new Paho.MQTT.Client(BROKER, PORT, CLIENT_ID);
        

        // Stores the active WebRTC instance handling the video/audio streams
        let peerConnection = null;
        // Holds the raw media tracks from the operator's local webcam/microphone
        let globalLocalStream = null; 
        // Trackers to toggle media states without destroying the WebRTC connection
        let isMuted = false;
        let isVideoStopped = false;

        // Reference prices for cart logic
        const menuPrices = {
            "Caesar Salad": 8.50, "Garlic Bread": 5.00,
            "Temi Burger": 15.00, "Grilled Salmon": 18.00,
            "Choco Fondant": 6.50, "Cheesecake": 7.00,
            "Coca-Cola": 3.50, "Water Bottle": 2.00
        };
        // Array storing current order items synced from the robot
        let liveCart = [];

        // STUN server configuration to discover public IP addresses for P2P connection
        const rtcConfig = { 
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' }
            ] 
        };

        // angle value selected by operator
        function setTiltAngle(angle) {
            publishData("temi/commands", { tiltAngle: parseInt(angle) });
            // text for angle value
            document.getElementById("tilt-value").innerText = angle + "°";
        }

        // renders the shopping cart DOM elements when items are added or cleared
        function updateLiveCartUI() {
            const list = document.getElementById("live-cart-list");
            const totalEl = document.getElementById("live-cart-total");
            
            if (liveCart.length === 0) {
                list.innerHTML = '<li class="text-gray-500 italic">Empty cart...</li>';
                totalEl.innerText = "Total: RM0.00";
                return;
            }

            list.innerHTML = "";
            let total = 0;
            liveCart.forEach(item => {
                let price = menuPrices[item] || 0;
                total += price;
                let li = document.createElement("li");
                li.innerText = `✓ ${item} - RM${price.toFixed(2)}`;
                list.appendChild(li);
            });
            totalEl.innerText = `Total: RM${total.toFixed(2)}`;
        }

        // Resets the virtual cart array and clears the visual UI
        function clearLiveCart() {
            liveCart = [];
            updateLiveCartUI();
        }

        // Injects a new notification entry at the top of the Activity Log window
        function addLog(text, colorClass = "text-yellow-500", bold = false) {
            const list = document.getElementById("menu-notifications");
            if(list && list.innerHTML.includes("Waiting")) list.innerHTML = "";
            let li = document.createElement("li");
            li.innerText = text;
            li.className = `${colorClass} ${bold ? 'font-bold' : ''}`;
            if(list) list.prepend(li);
        }


        // Callback triggered automatically if the connection to HiveMQ is severed
        mqtt.onConnectionLost = function (responseObj) {
            const sb = document.getElementById("status-bar");
            sb.classList.replace("bg-green-600", "bg-red-600");
            sb.innerText = "🔴 MQTT CONNECTION LOST";
        };

        // Core listener that processes all incoming MQTT messages from the robot
        mqtt.onMessageArrived = function (message) {
            const payload = JSON.parse(message.payloadString);
            
            // Apply the WebRTC Answer SDP generated by the robot's Android app
            if (message.destinationName === "temi/webrtc/answer") {
                peerConnection.setRemoteDescription(new RTCSessionDescription(payload));
            } 
            // Add ICE networking candidates sent by the robot to establish the video link
            else if (message.destinationName === "temi/webrtc/candidate/robot") {
                peerConnection.addIceCandidate(new RTCIceCandidate(payload));
            } 
            // Generic status updates (navigation progress) from the Temi SDK
            else if (message.destinationName === "temi/status") {
                console.log("Status update received");
            } 
            // Payload containing customer menu interactions and cart validations
            else if (message.destinationName === "temi/menu") {
                
                // Triggers when the customer finalizes the order on the Temi screen
                if (payload.type === "order_validation") {
                    
                    // Generate a downloadable CSV receipt dynamically on the client side
                    let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
                    csvContent += "Date_Time;Item;Price_RM\n"; 

                    payload.items.forEach(function(item) {
                        csvContent += `${payload.timestamp};${item.name};${item.price.toFixed(2)}\n`;
                    });
                    csvContent += `;;TOTAL : ${payload.total.toFixed(2)}\n`;

                    // Encode and trigger the automatic download of the CSV file
                    let encodedUri = encodeURI(csvContent);
                    let link = document.createElement("a");
                    link.setAttribute("href", encodedUri);
                    let safeFileName = payload.timestamp.replace(/[: ]/g, "_");
                    link.setAttribute("download", `Temi_Order_${safeFileName}.csv`);
                    document.body.appendChild(link); 
                    link.click();
                    document.body.removeChild(link);

                    // Play a short audible beep to notify the operator/kitchen
                    new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play().catch(e => {});
                    
                    // Log the success in the UI and flush the current session's cart
                    addLog(`ORDER VALIDATED: ${payload.items.length} items (Total: RM${payload.total.toFixed(2)})`, "text-green-500", true);
                    clearLiveCart();
                } 
                // Triggers when a customer adds a single item to the cart
                else if (payload.request) {
                    addLog(`+ ${payload.request}`, "text-yellow-500");
                    liveCart.push(payload.request);
                    updateLiveCartUI();
                }
            }
        };

        // Initialize connection to the HiveMQ broker with provided credentials
        mqtt.connect({
            userName: "temi_admin",          
            password: "TestTemi1",     
            useSSL: true,                    
            onSuccess: function () { 
                // Update UI to reflect a successful connection state
                const sb = document.getElementById("status-bar");
                sb.classList.replace("bg-red-600", "bg-green-600");
                sb.innerText = "🟢 ONLINE (CLOUD) - Ready for video";
                
                // Subscribe to necessary topics to listen for robot responses
                mqtt.subscribe("temi/webrtc/answer");
                mqtt.subscribe("temi/webrtc/candidate/robot");
                mqtt.subscribe("temi/status");
                mqtt.subscribe("temi/menu");
                publishMode('MANUEL'); 
            },
            onFailure: function (message) {
                // Log and display broker connection failures
                const sb = document.getElementById("status-bar");
                sb.classList.replace("bg-green-600", "bg-red-600");
                sb.innerText = "🔴 CLOUD CONNECTION FAILED: " + message.errorMessage;
            }
        });

        // Helper function to stringify JSON and push it over MQTT with zero latency (QoS 0)
        function publishData(topic, payloadObj) {
            if (mqtt.isConnected()) {
                let message = new Paho.MQTT.Message(JSON.stringify(payloadObj));
                message.destinationName = topic;
                message.qos = 0; 
                mqtt.send(message);
            }
        }

        // Core asynchronous function to bootstrap the WebRTC connection
        async function startWebRTCCall() {
            peerConnection = new RTCPeerConnection(rtcConfig);

            // Forward local networking routing paths (ICE) to the robot via MQTT
            peerConnection.onicecandidate = event => {
                if (event.candidate) publishData("temi/webrtc/candidate/pc", event.candidate);
            };

            // Bind the incoming video/audio track from the robot to the HTML <video> tag
            peerConnection.ontrack = event => {
                document.getElementById("remote-video").srcObject = event.streams[0];
                
                // Visual feedback updating the call button UI
                const btn = document.getElementById('btn-call');
                btn.innerText = "Call Active";
                btn.classList.replace("bg-temi-orange", "bg-green-600");
                btn.classList.replace("hover:bg-temi-orange-hover", "hover:bg-green-700");
            };

            try {
                // Highly optimized local media constraints to save upload bandwidth
                const constraints = {
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 360 },
                        frameRate: { ideal: 15, max: 24 } 
                    },
                    audio: {
                        echoCancellation: true, // Crucial to prevent audio feedback loops
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                };

                // Request camera and microphone access from the browser
                const localStream = await navigator.mediaDevices.getUserMedia(constraints);
                globalLocalStream = localStream; 
                document.getElementById("local-video").srcObject = localStream;
                
                // Inject the local media tracks into the WebRTC peer connection
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                // Scan capabilities to explicitly prioritize the H264 hardware codec
                const transceivers = peerConnection.getTransceivers();
                transceivers.forEach(transceiver => {
                    if (transceiver.sender && transceiver.sender.track && transceiver.sender.track.kind === 'video') {
                        const capabilities = RTCRtpSender.getCapabilities('video');
                        if (capabilities && capabilities.codecs) {
                            // Filter out VP8/VP9 to force hardware acceleration on the Temi side
                            const h264Codecs = capabilities.codecs.filter(c => c.mimeType.toLowerCase() === 'video/h264');
                            if (h264Codecs.length > 0) {
                                transceiver.setCodecPreferences(h264Codecs);
                            }
                        }
                    }
                });

            } catch (e) {
                // Handle cases where the operator lacks hardware or denied permissions
                console.warn("Camera/Mic not accessible on this PC/Phone.", e);
                alert("Please allow camera access to send your video to the robot and see yourself on screen.");
            }

            // Generate the local SDP offer and send it to the Android app for negotiation
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            publishData("temi/webrtc/offer", { type: offer.type, sdp: offer.sdp });
        }

        // Disables the local audio track to temporarily mute the operator
        function toggleMute() {
            if(!globalLocalStream) return;
            isMuted = !isMuted;
            globalLocalStream.getAudioTracks()[0].enabled = !isMuted;
            const btn = document.getElementById('btn-mute');
            btn.innerText = isMuted ? "Unmute Mic" : "Mute Mic";
            if(isMuted) {
                btn.classList.replace("bg-temi-button", "bg-red-600");
                btn.classList.replace("hover:bg-temi-button-hover", "hover:bg-red-700");
            } else {
                btn.classList.replace("bg-red-600", "bg-temi-button");
                btn.classList.replace("hover:bg-red-700", "hover:bg-temi-button-hover");
            }
        }

        // Disables the local video track (turns the PIP screen black)
        function toggleVideo() {
            if(!globalLocalStream) return;
            isVideoStopped = !isVideoStopped;
            globalLocalStream.getVideoTracks()[0].enabled = !isVideoStopped;
            const btn = document.getElementById('btn-video');
            btn.innerText = isVideoStopped ? "Enable Video" : "Disable Video";
            if(isVideoStopped) {
                btn.classList.replace("bg-temi-button", "bg-red-600");
                btn.classList.replace("hover:bg-temi-button-hover", "hover:bg-red-700");
            } else {
                btn.classList.replace("bg-red-600", "bg-temi-button");
                btn.classList.replace("hover:bg-red-700", "hover:bg-temi-button-hover");
            }
        }


        // Send a specific predefined location string to trigger autonomous mapping
        function sendGoTo(destinationName) {
            publishData("temi/commands", { action: "goto", destination: destinationName });
        }

        // Toggle the internal state flag of the Android app (AUTO vs MANUAL)
        function publishMode(mode) {
            if (mqtt.isConnected()) {
                let msg = new Paho.MQTT.Message(mode);
                msg.destinationName = "temi/mode";
                mqtt.send(msg);
            }
        }

        // Variables managing the continuous MQTT transmission loop for arrow control
        let movementLoop = null;
        let currentSpeed = 0.0;
        let currentRotation = 0.0;

        // Triggers the drive sequence when a D-Pad button or keyboard key is pressed
        function startJoy(speed, rotation) {
            currentSpeed = speed;
            currentRotation = rotation;
            publishData("temi/joystick", { speed: currentSpeed, rotation: currentRotation });
            
            // Re-broadcasts the speed instructions every 100ms to keep the robot moving
            if (movementLoop) clearInterval(movementLoop);
            movementLoop = setInterval(() => { 
                publishData("temi/joystick", { speed: currentSpeed, rotation: currentRotation }); 
            }, 100); 
        }

        // Interrupts the interval loop and sends a hard-stop zero-velocity command
        function stopJoy() {
            if (movementLoop) { clearInterval(movementLoop); movementLoop = null; }
            currentSpeed = 0.0;
            currentRotation = 0.0;
            publishData("temi/joystick", { speed: 0.0, rotation: 0.0 });
        }

        // KEYBOARD CONTROLS
        // State dictionary maintaining which directional keys are actively held down
        const activeKeys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        // Translates keyboard states into specific forward/backward or rotational floats
        function updateJoystickFromKeys() {
            let s = 0.0;
            let r = 0.0;

            if (activeKeys["ArrowUp"]) s = 1.0;
            if (activeKeys["ArrowDown"]) s = -1.0;
            if (activeKeys["ArrowLeft"]) r = 0.5;
            if (activeKeys["ArrowRight"]) r = -0.5;

            // If no keys are actively pressed, halt the robot immediately
            if (s === 0.0 && r === 0.0) {
                stopJoy();
            } else {
                startJoy(s, r);
            }
        }

        // Listen for key presses globally to bind PC keyboard arrows to movement
        document.addEventListener("keydown", (event) => {
            if (activeKeys.hasOwnProperty(event.key)) {
                event.preventDefault(); 
                if (!activeKeys[event.key]) {
                    activeKeys[event.key] = true;
                    updateJoystickFromKeys();
                }
            }
        });

        // Listen for key releases to stop applying velocity to the corresponding axis
        document.addEventListener("keyup", (event) => {
            if (activeKeys.hasOwnProperty(event.key)) {
                event.preventDefault();
                activeKeys[event.key] = false;
                updateJoystickFromKeys();
            }
        });
    </script>
</body>
</html>
